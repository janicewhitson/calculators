<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freelance Rate Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:        #4A6FA5;
      --blue-dark:   #3a5a8f;
      --blue-light:  #e8eef6;
      --page-bg:     #E8E6E2;
      --card-bg:     #FAFAF8;
      --text:        #2c2c2c;
      --text-muted:  #6b6b6b;
      --border:      #d4d1cc;
      --result-bg:   #4A6FA5;
      --result-text: #ffffff;
      --error:       #b94040;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--page-bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .wrapper {
      max-width: 680px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.2rem;
      font-weight: 400;
      color: var(--blue);
      line-height: 1.15;
    }

    header p {
      margin-top: 0.5rem;
      font-size: 0.95rem;
      color: var(--text-muted);
      max-width: 520px;
      line-height: 1.55;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.75rem 2rem;
      margin-bottom: 1.25rem;
    }

    .card h2 {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 1.25rem;
    }

    .field {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .field:last-child { margin-bottom: 0; }

    label {
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.3;
    }

    label .hint {
      display: block;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }

    .input-wrap {
      position: relative;
      width: 160px;
    }

    .input-wrap .prefix,
    .input-wrap .suffix {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.88rem;
      color: var(--text-muted);
      pointer-events: none;
    }

    .input-wrap .prefix { left: 10px; }
    .input-wrap .suffix { right: 10px; }

    input[type="number"] {
      width: 100%;
      padding: 0.55rem 0.75rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-light);
    }

    .has-prefix input { padding-left: 22px; }
    .has-suffix input { padding-right: 28px; }

    /* Result card */
    .result-card {
      background: var(--blue);
      border: none;
      border-radius: 10px;
      padding: 1.75rem 2rem;
      margin-bottom: 1.25rem;
      color: var(--result-text);
    }

    .result-card h2 {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-bottom: 0.75rem;
    }

    .rate-display {
      font-family: 'DM Serif Display', serif;
      font-size: 3.8rem;
      line-height: 1;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .rate-display .currency {
      font-size: 2rem;
      vertical-align: top;
      margin-top: 0.55rem;
      display: inline-block;
      opacity: 0.75;
    }

    .rate-display .per {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      opacity: 0.75;
      margin-left: 0.25rem;
    }

    .rate-logic {
      margin-top: 0.9rem;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.7);
      line-height: 1.6;
      border-top: 1px solid rgba(255,255,255,0.2);
      padding-top: 0.9rem;
    }

    .rate-logic span {
      color: rgba(255,255,255,0.95);
      font-weight: 500;
    }

    .billable-note {
      margin-top: 0.6rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
    }

    .error-msg {
      color: var(--error);
      font-size: 0.82rem;
      margin-top: 0.4rem;
      display: none;
    }

    footer {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 1rem;
      padding-bottom: 1rem;
    }

    footer a {
      color: var(--blue);
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    @media (max-width: 520px) {
      header h1 { font-size: 1.7rem; }
      .card, .result-card { padding: 1.25rem 1.25rem; }
      .field { grid-template-columns: 1fr; gap: 0.4rem; }
      .input-wrap { width: 100%; }
      .rate-display { font-size: 3rem; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <h1>What should you charge?</h1>
    <p>Enter your income target and working assumptions. Your minimum hourly rate updates as you type.</p>
  </header>

  <!-- Income inputs -->
  <div class="card">
    <h2>Income &amp; Expenses</h2>

    <div class="field">
      <label for="netIncome">
        Target net income
        <span class="hint">What you want to take home after expenses and taxes</span>
      </label>
      <div class="input-wrap has-prefix">
        <span class="prefix">$</span>
        <input type="number" id="netIncome" value="65000" min="0" step="1000" />
      </div>
    </div>

    <div class="field">
      <label for="bizExpenses">
        Annual business expenses
        <span class="hint">Software, dues, equipment, insurance, etc.</span>
      </label>
      <div class="input-wrap has-prefix">
        <span class="prefix">$</span>
        <input type="number" id="bizExpenses" value="8000" min="0" step="500" />
      </div>
    </div>

    <div class="field">
      <label for="taxReserve">
        Tax &amp; retirement reserve
        <span class="hint">% of gross revenue to set aside</span>
      </label>
      <div class="input-wrap has-suffix">
        <input type="number" id="taxReserve" value="30" min="0" max="60" step="1" />
        <span class="suffix">%</span>
      </div>
    </div>
  </div>

  <!-- Time inputs -->
  <div class="card">
    <h2>Working Time</h2>

    <div class="field">
      <label for="workWeeks">
        Working weeks per year
        <span class="hint">Excludes holidays, sick days, and time off</span>
      </label>
      <div class="input-wrap">
        <input type="number" id="workWeeks" value="47" min="1" max="52" step="1" />
      </div>
    </div>

    <div class="field">
      <label for="hoursPerWeek">
        Hours worked per week
      </label>
      <div class="input-wrap">
        <input type="number" id="hoursPerWeek" value="40" min="1" max="80" step="1" />
      </div>
    </div>

    <div class="field">
      <label for="billablePct">
        Billable time
        <span class="hint">Not every hour is a paid hour — admin, pitching, and learning take time too</span>
      </label>
      <div class="input-wrap has-suffix">
        <input type="number" id="billablePct" value="60" min="1" max="100" step="5" />
        <span class="suffix">%</span>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div class="result-card">
    <h2>Minimum Hourly Rate</h2>
    <div class="rate-display">
      <span class="currency">$</span><span id="rateValue">—</span><span class="per">/hr</span>
    </div>
    <div class="rate-logic" id="rateLogic"></div>
    <div class="billable-note" id="billableNote"></div>
  </div>

  <footer>
    Built by <a href="https://janicewhitson.github.io/calculators" target="_blank">Janice Whitson</a>
  </footer>

</div>

<script>
  const ids = ['netIncome','bizExpenses','taxReserve','workWeeks','hoursPerWeek','billablePct'];
  ids.forEach(id => document.getElementById(id).addEventListener('input', calculate));

  function fmt(n) {
    return n.toLocaleString('en-CA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function calculate() {
    const net      = parseFloat(document.getElementById('netIncome').value)    || 0;
    const exp      = parseFloat(document.getElementById('bizExpenses').value)  || 0;
    const taxPct   = parseFloat(document.getElementById('taxReserve').value)   || 0;
    const weeks    = parseFloat(document.getElementById('workWeeks').value)    || 0;
    const hrs      = parseFloat(document.getElementById('hoursPerWeek').value) || 0;
    const billable = parseFloat(document.getElementById('billablePct').value)  || 0;

    const rateEl   = document.getElementById('rateValue');
    const logicEl  = document.getElementById('rateLogic');
    const noteEl   = document.getElementById('billableNote');

    if (taxPct >= 100 || weeks <= 0 || hrs <= 0 || billable <= 0) {
      rateEl.textContent = '—';
      logicEl.textContent = '';
      noteEl.textContent = '';
      return;
    }

    const grossNeeded    = (net + exp) / (1 - taxPct / 100);
    const totalHours     = weeks * hrs;
    const billableHours  = totalHours * (billable / 100);
    const rate           = grossNeeded / billableHours;
    const billablePerWk  = Math.round(hrs * (billable / 100));

    rateEl.textContent = fmt(rate);

    logicEl.innerHTML =
      `<span>$${fmt(grossNeeded)}</span> gross revenue needed &divide; <span>${Math.round(billableHours).toLocaleString('en-CA')}</span> billable hours = <span>$${fmt(rate)}/hr</span>`;

    noteEl.textContent =
      `At ${billable}% billable, a ${hrs}-hour week gives you roughly ${billablePerWk} paid hours.`;
  }

  calculate();
</script>
</body>
</html>
